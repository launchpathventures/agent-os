  integrations: [ecommerce-platform, product-database]
  template: false
  complexity: simple

- id: social-media-content
  name: Draft social media posts
  one_liner: A week of social content drafted in minutes, consistent with your brand and calendar.
  domain: marketing
  personas: [lisa, jordan]
  trigger: time-based — weekly content batch, or event — new product/announcement
  steps:
    - Review content calendar for upcoming themes
    - Draft posts for each platform (tone and format adapted)
    - Include relevant product links and hashtags
    - Queue batch for review
  good_looks_like: On-brand voice, platform-appropriate format, no broken links, aligns with content calendar
  integrations: [social-media, content-calendar]
  template: false
  complexity: simple

- id: email-campaign-drafting
  name: Draft email marketing campaigns
  one_liner: Campaign emails that match your voice and segment, without starting from scratch every time.
  domain: marketing
  personas: [lisa]
  trigger: manual or time-based — campaign calendar
  steps:
    - Pull segment data and campaign brief
    - Draft email copy with subject line variants
    - Format to email template
    - Queue for review with A/B test suggestions
  good_looks_like: Copy matches segment tone, CTA clear, subject lines compelling, unsubscribe and compliance elements present
  integrations: [email-marketing, crm]
  template: false
  complexity: moderate

- id: competitor-price-monitoring
  name: Monitor competitor pricing
  one_liner: Know when a competitor changes their prices before your customers do.
  domain: ecommerce
  personas: [lisa]
  trigger: time-based — daily scan
  steps:
    - Scan competitor product pages for price changes
    - Compare against your current pricing
    - Flag products where gap exceeds threshold
    - Generate pricing alert with recommended actions
  good_looks_like: Prices accurately captured, thresholds respected, alerts actionable (not just "price changed"), no false positives from sale prices
  integrations: [ecommerce-platform, web-scraping]
  template: false
  complexity: moderate

- id: content-review-pipeline
  name: Review and approve content before publication
  one_liner: Content goes through quality checks before it reaches customers — not after.
  domain: marketing
  personas: [lisa, nadia]
  trigger: event — content submitted for review
  steps:
    - Check brand voice compliance
    - Verify factual claims and links
    - Flag potential issues (legal, sensitivity, accuracy)
    - Queue for human approval or auto-publish based on trust tier
  good_looks_like: Brand voice consistent, no broken links, factual claims verifiable, sensitive content always human-reviewed
  integrations: [cms, docs]
  template: true
  complexity: simple

