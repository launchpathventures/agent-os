  name: Keep internal knowledge base current
  one_liner: Documentation that updates itself when processes change — instead of decaying silently.
  domain: team-ops
  personas: [jordan, nadia]
  trigger: event — process change, or time-based — periodic review
  steps:
    - Detect changes in processes, tools, or policies
    - Identify affected knowledge base articles
    - Draft updates reflecting current state
    - Queue for subject matter expert review
  good_looks_like: Changes accurately reflected, no stale information published, SME review on substantive changes
  integrations: [knowledge-base, docs]
