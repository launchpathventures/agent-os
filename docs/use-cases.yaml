# Ditto — Use Case Database
#
# Concrete outcomes people use Ditto for. Each entry describes a real process
# someone would recognise from their working life. These feed into:
#   - Template library (templates/) — entries with template: true have one
#   - Process-analyst agent — knowledge base for guided discovery
#   - Landing page / README — recognition-driven marketing
#   - Onboarding — "which of these sounds like your work?"
#
# Structure per entry:
#   id: machine-readable identifier
#   name: what you'd call it in conversation
#   one_liner: the outcome in one sentence — what changes for the person
#   domain: business domain (trades, ecommerce, professional-services, team-ops, finance, hr, marketing, customer-success, general)
#   personas: which persona archetypes this resonates with [rob, lisa, jordan, nadia]
#   trigger: what kicks it off (time-based, event, manual, data-change)
#   steps: 3-5 plain language steps — how the process works
#   good_looks_like: the quality standard the human would check
#   integrations: external systems involved (email, accounting, crm, etc.)
#   template: whether a template exists in templates/ (true/false)
#   complexity: simple (1-2 steps, single tool) | moderate (3-5 steps, mixed) | complex (6+ steps, multi-system, human steps)

---

# ============================================================
# QUOTING & SALES
# ============================================================

- id: quote-generation
  name: Generate quotes from job specs
  one_liner: Customer enquiries become accurate quotes in minutes instead of hours at the kitchen table.
  domain: trades
  personas: [rob]
  trigger: event — new customer enquiry (email, text, voicemail transcription)
  steps:
    - Parse the customer request for job type, scope, and site details
    - Look up material costs from supplier price list
    - Estimate labour based on job type and historical data
    - Apply margin rules (residential vs commercial)
    - Draft quote document and send for review
  good_looks_like: Materials priced correctly, labour estimate within 10% of actuals, margin applied consistently, professional formatting
  integrations: [email, supplier-price-list, accounting]
  template: false
  complexity: moderate

- id: quote-follow-up
  name: Follow up on unanswered quotes
  one_liner: No more lost jobs because you forgot to call back.
  domain: trades
  personas: [rob]
  trigger: time-based — quote older than X days with no response
  steps:
    - Identify quotes with no customer response past threshold
    - Draft follow-up message (tone escalates with age)
    - Send or queue for human review based on trust tier
    - Log outcome (won, lost, still pending)
  good_looks_like: Follow-up sent within the window, tone appropriate, no follow-up on already-accepted quotes
  integrations: [email, crm]
  template: false
  complexity: simple

- id: sales-proposal-drafting
  name: Draft sales proposals from meeting notes
  one_liner: Meeting notes become polished proposals without spending the evening rewriting them.
  domain: professional-services
  personas: [jordan, nadia]
  trigger: manual — after a client meeting
  steps:
    - Parse meeting notes or voice capture for key requirements
    - Match requirements against service offerings
    - Draft proposal with scope, timeline, and pricing
    - Format to company template
    - Queue for review
  good_looks_like: All discussed requirements captured, pricing matches rate card, scope boundaries clear, no hallucinated commitments
  integrations: [docs, crm]
  template: false
  complexity: moderate

# ============================================================
# INVOICING & ACCOUNTS
# ============================================================

- id: invoice-follow-up
  name: Chase overdue invoices
  one_liner: Overdue invoices get chased automatically — escalation decisions stay with you.
  domain: finance
  personas: [rob, lisa, jordan]
  trigger: time-based — weekly scan or when invoices pass due date
  steps:
    - Identify invoices past due date, categorise by age (30/60/90+ days)
    - Draft reminder emails with tone matching overdue period
    - High-value invoices go to human for escalation decision
    - Send approved reminders and log outcomes
  good_looks_like: All overdue invoices caught, tone appropriate to relationship, high-value always human-reviewed, payment outcomes tracked
  integrations: [accounting, email]
  template: true
  complexity: moderate

- id: monthly-reconciliation
  name: Reconcile monthly accounts
  one_liner: Month-end reconciliation that takes 2 people 2 days, done in hours with human sign-off on exceptions.
  domain: finance
  personas: [jordan, nadia]
  trigger: time-based — end of month
  steps:
    - Pull transactions from bank feed and accounting system
    - Match transactions automatically by amount, date, reference
    - Flag unmatched transactions as exceptions
    - Human reviews and resolves exceptions
    - Generate reconciliation report
  good_looks_like: All transactions accounted for, exceptions genuinely ambiguous (not lazy matching), report balances to the cent
  integrations: [accounting, bank-feed]
  template: false
  complexity: complex

- id: expense-categorisation
  name: Categorise and process expense claims
  one_liner: Receipts get categorised correctly without someone manually keying every line item.
  domain: finance
  personas: [jordan, nadia]
  trigger: event — receipt submitted or expense report uploaded
  steps:
    - Extract line items from receipt image or PDF
    - Categorise against chart of accounts
    - Flag policy violations (amount limits, restricted categories)
    - Queue compliant claims for approval, violations for review
  good_looks_like: Categories match actual spend, policy violations caught before payment, no duplicate submissions processed
  integrations: [accounting, receipt-scanner]
  template: false
  complexity: moderate

