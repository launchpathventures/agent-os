# Ditto — Template Process: User Nurture — First Week
#
# Alex's relationship with the USER after the front door conversation.
# This is NOT prospect follow-ups — this is Alex being a good advisor:
# checking in, sharing progress, asking for feedback, building trust.
#
# KEY PATTERN: Response-gated cadence. Alex sends, waits for engagement,
# then decides what to do next. Not a fixed timer that fires regardless.
# If the user is engaged, Alex matches their energy. If silent, Alex
# adjusts cadence and eventually gives space.
#
# ALL emails are replies in the same thread started by front-door-intake's
# gather-details step. The user sees ONE conversation, not 6 separate emails.
#
# Provenance: Insight-164 (professional consent model),
# Insight-166 (connection first, commerce follows)

name: "User Nurture — First Week"
id: user-nurture-first-week
version: 2
status: active
template: true
callable_as: sub-process

operator: alex-or-mira

description: >
  The first week after a user signs up. Alex stays in touch like a real
  advisor — adaptive, not mechanical. Response-gated: each step checks
  whether the user has engaged before deciding what to send next.
  All emails reply in the same thread. A real advisor has ONE conversation
  with you, not a drip campaign.

trigger:
  type: process-complete
  description: Triggered when front-door-intake or front-door-cos-intake completes its report-back step

inputs:
  - name: personId
    type: text
    source: self
    required: true
  - name: userId
    type: text
    source: self
    required: true
  - name: email
    type: text
    source: self
    required: true
  - name: name
    type: text
    source: self
    required: false
  - name: detectedMode
    type: text
    source: self
    required: true
    description: "connector, sales, cos, or both"
  - name: conversationSummary
    type: text
    source: self
    required: true
  - name: outreachResults
    type: json
    source: process
    required: false

steps:
  # Day 2: Progress note — only if user hasn't already replied to report-back
  # If they replied, they're engaged — Alex should respond to THEM, not fire
  # a canned update. The gate checks: have they replied since report-back?
  - id: day-2-check-in
    name: "Day 2 — Progress check-in"
    executor: ai-agent
    email_thread: "user-onboarding"
    schedule:
      delay: "24h"
      after: trigger
    gate:
      engagement: silent
      since_step: report-back
      fallback: skip
    description: >
      The user hasn't replied to the report-back yet. Send a brief,
      personal progress note in the same thread. NOT a status report —
      a human note from someone who's working on your thing.

      [If connector/sales] Share one development: an early response,
      a new target found, or an observation about their market.
      [If CoS] Share what you've learned from analyzing their situation.

      Keep it under 3 sentences. End with something that invites a reply
      but doesn't demand one. This is a heartbeat, not a deliverable.
    config:
      model_hint: fast
      person_id: "{personId}"
    tools:
      - crm.send_email
      - crm.get_interactions
    inputs:
      - conversationSummary
      - outreachResults

  # Day 4: Value-add — only if still silent. If they replied, skip.
  - id: day-4-value
    name: "Day 4 — Mid-week insight"
    executor: ai-agent
    email_thread: "user-onboarding"
    schedule:
      delay: "4d"
      after: trigger
    gate:
      engagement: silent
      since_step: report-back
      fallback: skip
    description: >
      Still no reply. Share something genuinely useful — not a check-in.

      [If connector/sales] A market insight, a relevant trend, or a
      strategic observation about their target space. "I noticed [insight].
      Thought you should know."
      [If CoS] A decision framework, priority observation, or pattern.
      "I've been thinking about [their situation] — have you considered
      [reframe]?"

      If you don't have something genuinely useful, DO NOT SEND. A real
      advisor knows when to stay quiet. Set output { skipped: true }.
    config:
      model_hint: capable
      person_id: "{personId}"
    tools:
      - crm.send_email
      - web-search
    inputs:
      - conversationSummary
    depends_on:
      - day-2-check-in

  # Day 7: Week 1 wrap-up — ALWAYS sends (whether they replied or not)
  # This is the one guaranteed touchpoint. It summarizes the week and
  # explicitly asks for feedback. If they've been engaged, reference
  # the conversation. If silent, make this the "are you still there?"
  - id: day-7-summary
    name: "Day 7 — Week 1 wrap-up"
    executor: ai-agent
    email_thread: "user-onboarding"
    schedule:
      delay: "7d"
      after: trigger
    description: >
      End the first week with a proper summary. This ALWAYS sends.

      Check engagement since report-back:
      [If user has replied] Reference their feedback. Summarize what you've
      done, how their input shaped your work, and what's next.
      [If user has been silent] Acknowledge the silence gracefully. Summarize
      what you did this week anyway. Make the ask explicit: "I want to make
      sure I'm heading in the right direction — does this look right to you?"

      [If connector/sales] Include:
      - Who was contacted and responses so far
      - Actual outreach text sent (quote from outreachResults if available):
        "Here's what I sent to [name]: [quoted text]"
      - Follow-ups sent or queued
      - What you plan next week
      End with: "How am I doing? Anyone I should be targeting that I'm not?"

      [If CoS] Include:
      - What you've learned about their priorities
      - How you plan to structure next Monday's briefing
      End with: "Is this useful? What would make the briefing better?"

      The feedback question is critical. Capture response as process memory.
    config:
      model_hint: capable
      person_id: "{personId}"
    tools:
      - crm.send_email
      - crm.get_interactions
    inputs:
      - conversationSummary
      - outreachResults
    depends_on:
      - day-4-value
    # Wait for their response to the week 1 summary
    wait_for:
      event: reply
      timeout: "5d"

outputs:
  - name: user-feedback
    type: text
    description: Any feedback the user provided during the first week
  - name: engagement-level
    type: text
    description: "active (replied), passive (opened but no reply), silent (no engagement)"

# After first week, transition to regular rhythm.
# The engagement level from this process informs cadence.
chain:
  # If user replied at any point — they're active. Standard weekly rhythm.
  - trigger: engagement-active
    condition: engagement-level == "active"
    process: pipeline-tracking
    inputs:
      personId: "{personId}"
      userId: "{userId}"

  # If user was silent through the entire first week — back off.
  # One more try, then respect the silence.
  - trigger: engagement-silent
    condition: engagement-level == "silent"
    delay: 5d
    process: user-reengagement
    inputs:
      personId: "{personId}"
      userId: "{userId}"
      email: "{email}"
      conversationSummary: "{conversationSummary}"

quality_criteria:
  - "Every email adds value — no 'just checking in'"
  - "All emails in the same thread — ONE conversation"
  - "Silent users get fewer emails, not more"
  - "Engaged users get responses, not canned sequences"
  - "Day 7 always sends — it's the guaranteed checkpoint"
  - "Feedback invited and captured"

trust:
  initial_tier: autonomous
  upgrade_path: []
  downgrade_triggers:
    - "User asks Alex to stop emailing"
    - "User marks email as spam"
